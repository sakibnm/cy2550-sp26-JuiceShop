<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main class="main">
    <article>
      <div class="post-content">
        {{ .Content }}
      </div>
    </article>
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
